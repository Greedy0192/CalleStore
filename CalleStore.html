<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalleStore</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* RESET */
/* ========================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ========================= */
/* BODY */
/* ========================= */

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    overflow-x: hidden;
}

/* ========================= */
/* TOUCH FIX */
/* ========================= */

button, input {
    -webkit-tap-highlight-color: transparent;
}

/* ========================= */
/* PARTICLES */
/* ========================= */

#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* ========================= */
/* HEADER */
/* ========================= */

header {
    display: flex;
    justify-content: center;
    padding: 20px;
    background: rgba(10,15,30,0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,255,255,0.2);
}

.logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 30px;
    font-weight: 600;
    color: #38bdf8;
    text-shadow: 0 0 10px #38bdf8, 0 0 25px #0ea5e9;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(56,189,248,0.5);
}

.hero p {
    opacity: 0.7;
    margin-top: 10px;
}

/* ========================= */
/* SEARCH */
/* ========================= */

.search {
    display: flex;
    justify-content: center;
    margin: 20px;
}

.search input {
    width: 60%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid rgba(0,255,255,0.3);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

/* ========================= */
/* GRID */
/* ========================= */

.apps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 40px;
}

/* ========================= */
/* CARD */
/* ========================= */

.app-card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    border: 1px solid rgba(0,255,255,0.15);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.app-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 25px rgba(56,189,248,0.4);
}

/* TEXT */

.app-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    color: #e0f2fe;
    text-shadow: 0 0 8px rgba(56,189,248,0.5);
    margin-bottom: 6px;
}

.app-desc {
    font-size: 13px;
    opacity: 0.75;
    color: #cbd5e1;
}

/* ========================= */
/* BUTTON */
/* ========================= */

.download-btn {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;

    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: white;

    background: linear-gradient(90deg,#38bdf8,#0ea5e9);
    box-shadow: 0 0 15px rgba(56,189,248,0.3);

    transition: 0.25s;
    position: relative;
    overflow: hidden;
}

.download-btn:hover {
    transform: scale(1.05);
}

.download-btn:active {
    transform: scale(0.95);
}

.download-btn::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 200%;
    height: 200%;
    background: rgba(255,255,255,0.25);
    transform: translate(-50%, -50%) scale(0);
    border-radius: 50%;
    opacity: 0;
}

.download-btn.clicked::after {
    animation: flash 0.5s ease-out;
}

@keyframes flash {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}

/* ========================= */
/* FOOTER */
/* ========================= */

footer {
    text-align: center;
    padding: 20px;
    opacity: 0.6;
    border-top: 1px solid rgba(0,255,255,0.2);
    font-size: 13px;
}

/* ========================= */
/* RESPONSIVE MOBILE */
/* ========================= */

@media (max-width: 768px) {

    header {
        padding: 15px;
    }

    .logo {
        font-size: 22px;
    }

    .hero {
        padding: 40px 15px;
    }

    .hero h1 {
        font-size: 28px;
        line-height: 1.2;
    }

    .hero p {
        font-size: 14px;
    }

    .search {
        margin: 15px;
    }

    .search input {
        width: 100%;
        font-size: 14px;
    }

    .apps {
        grid-template-columns: 1fr;
        padding: 15px;
        gap: 15px;
    }

    .app-card {
        padding: 16px;
    }

    .app-title {
        font-size: 16px;
    }

    .app-desc {
        font-size: 12px;
    }

    .download-btn {
        padding: 14px;
        font-size: 14px;
    }
}

@media (max-width: 400px) {

    .hero h1 {
        font-size: 24px;
    }

    .logo {
        font-size: 20px;
    }
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>
    <div class="logo">CalleStore</div>
</header>

<section class="hero">
    <h1>Ladda ner moddade appar</h1>
    <p>Din egna moddade app store för Apple enheter – enkel, snabb och smidig</p>
</section>

<div class="search">
    <input id="search" placeholder="Sök appar...">
</div>

<section class="apps" id="apps"></section>

<footer>
    © 2026 CalleStore – All rights reserved
</footer>

<script>

/* APPS */
let apps = [
    {
        name: "Delta",
        desc: "Roblox Hacks",
        link: "itms-services://?action=download-manifest&url=https://deltaexecutor.filesadda.com/manifest%28deltaiofree1%29.plist"
    },
    {
        name: "Minecraft",
        desc: "Vanliga Minecraft Bedrock Edition",
        link: "itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/Greedy0192/CalleStore/refs/heads/main/minecraft.plist"
    },
    {
        name: "CalleVPN",
        desc: "Snabb och säker VPN med ett klick",
        link: "callevpn.html"
    },
    {
        name: "CalleGames",
        desc: "Samling av roliga och snabba spel",
        link: "callegames.html"
    },
    {
        name: "CalleMusic",
        desc: "Streama och upptäck ny musik gratis",
        link: "callemusic.html"
    }
];

let container = document.getElementById("apps");

function render() {
    container.innerHTML = "";

    apps.forEach(app => {
        let card = document.createElement("div");
        card.className = "app-card";

        card.innerHTML = `
            <div class="app-title">${app.name}</div>
            <div class="app-desc">${app.desc}</div>
            <button class="download-btn">Installera</button>
        `;

        let btn = card.querySelector(".download-btn");

        btn.addEventListener("click", () => {
            btn.classList.add("clicked");
            setTimeout(() => btn.classList.remove("clicked"), 500);

            if (app.link) {
                window.location.href = app.link;
            }
        });

        container.appendChild(card);
    });
}

render();

/* SEARCH */

document.getElementById("search").addEventListener("input", e => {
    let val = e.target.value.toLowerCase();
    document.querySelectorAll(".app-card").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
    });
});

/* PARTICLES */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);

resizeCanvas();

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0) p.x = canvas.width;
        if (p.y < 0) p.y = canvas.height;

        ctx.fillStyle = "#38bdf8";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
render();

</script>

</body>
</html>
